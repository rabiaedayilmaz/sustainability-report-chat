# Quickstart:
#   1. cp .env.example .env  &&  edit Qdrant credentials
#   2. Mac'inde Ollama uygulamasının açık olduğundan emin ol (veya terminalden 'ollama serve' yap).
#   3. Mac terminalinde modeli indir: ollama pull qwen3:8b
#   4. docker compose up --build -d
#   5. curl http://localhost:8000/health
#   6. curl -X POST http://localhost:8000/ask \
#         -H 'Content-Type: application/json' \
#         -d '{"question":"What are the 2009 emissions targets?"}'
#

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # DİKKAT: 'host.docker.internal' Docker container'ının senin Mac'ine ulaşmasını sağlar!
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Container içindeki Embedding modelleri için CPU kullanmaya devam ediyoruz.
      EMBEDDING_DEVICE: cpu
    volumes:
      # Persist large model caches across rebuilds.
      - hf_cache:/root/.cache/huggingface
      - paddle_cache:/root/.paddlex
      # Optionally mount data/ if you want to re-index from inside the container.
      - ./data:/app/data:ro
    restart: unless-stopped

volumes:
  hf_cache:
  paddle_cache: