name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ lint
  lint:
    name: Lint + syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        # Hand-picked rule set; disabling formatter complaints to keep PRs small.
        run: ruff check --select E,F,W,I --ignore E501 src/ scripts/ app.py
      - name: Compile-check every module
        run: python -m compileall -q src/ scripts/ app.py

  # ------------------------------------------------------------------ tests
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lightweight test deps
        # We install only the minimum needed by the dependency-free unit tests
        # (chunker, query_parser, version, manifest). Heavy deps like
        # paddleocr / sentence-transformers are NOT required for these tests.
        run: |
          pip install --upgrade pip
          pip install pytest pydantic pydantic-settings
      - name: Run pytest
        env:
          # Settings need these to load even if tests don't hit Qdrant.
          QDRANT_URL: "http://localhost:6333"
          QDRANT_API_KEY: "test"
        run: pytest -q tests/

  # ------------------------------------------------------------------ docker
  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sustainability-rag:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
