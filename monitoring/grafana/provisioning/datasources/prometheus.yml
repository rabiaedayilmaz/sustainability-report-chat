# Auto-provisioned Prometheus datasource — no manual setup in the Grafana UI.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus            # referenced by panels in dashboards/rag.json
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
