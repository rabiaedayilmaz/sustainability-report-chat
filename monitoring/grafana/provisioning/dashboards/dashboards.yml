# Tells Grafana to auto-load every dashboard JSON it finds in /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: rag-dashboards
    orgId: 1
    folder: RAG
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
