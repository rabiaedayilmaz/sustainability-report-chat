# Prometheus scrape configuration.
# The `api` host resolves via docker-compose's internal DNS to the FastAPI service.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: sustainability-rag

scrape_configs:
  - job_name: rag-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          component: api

  # Self-scrape so we have visibility into Prometheus itself.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
